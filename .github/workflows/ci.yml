name: CI

on:
  push:
      branches:
        - developer
  pull_request:
    branches:
      - main
      - developer
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  test:
    name: Build y Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Correr tests y validaciones
        working-directory: ./backend
        run: mvn verify

      - uses: docker/setup-buildx-action@v3

      - name: Verificar build de Docker
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: tacs-g4:latest
          build-args: MAVEN_ARGS=package -DskipTests
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
  loadtest:
	name: Load Test
	runs-on: ubuntu-latest
	needs: test          
	steps:
	    - uses: actions/checkout@v4
	
	    - name: Levantar infra de test
	    run: docker compose -f docker-compose.test.yml --profile test up -d --wait backend-test
	
	    - name: Correr load test
	    run: docker compose -f docker-compose.test.yml --profile test run --rm loadtest
	
	    - name: Bajar infra
	    if: always()
	    run: docker compose -f docker-compose.test.yml --profile test down
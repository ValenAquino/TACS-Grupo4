logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE

# Con esto la clases del dominio se mapean a json con snake case en lugar de camel case
spring.jackson.property-naming-strategy=SNAKE_CASE

spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/tacs}
spring.data.mongodb.replica-set-name=${MONGO_REPLICA_SET_NAME:}
spring.data.mongodb.auto-index-creation=true

cors.allowed-origin=${CORS_ORIGIN:http://localhost:5173}

# TheSportsDB
thesportsdb.base-url=https://www.thesportsdb.com/api/v1/json
thesportsdb.api-key=123
thesportsdb.rpm=30
thesportsdb.retry.max-attempts=3
thesportsdb.retry.wait-seconds=60

# Enrichment
enrichment.stale-timeout-seconds=30
enrichment.poll-interval-ms=2000
enrichment.poll-max-attempts=20
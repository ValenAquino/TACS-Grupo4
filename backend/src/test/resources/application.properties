# Embedded MongoDB para tests
de.flapdoodle.mongodb.embedded.version=7.0.12

# Snake case para las respuestas JSON (igual que en main/resources)
spring.jackson.property-naming-strategy=SNAKE_CASE

# Propiedades requeridas por @Value en TheSportsDbImagenProveedor
thesportsdb.base-url=https://www.thesportsdb.com/api/v1/json
thesportsdb.api-key=123
thesportsdb.rpm=30
thesportsdb.retry.max-attempts=3
thesportsdb.retry.wait-seconds=60

jwt.secret=${JWT_SECRET:secreto-super-secretoso-no-usar-en-prod-solo-dev}
jwt.expiration=${JWT_EXPIRATION:12h}

cors.allowed-origin=${CORS_ORIGIN:http://localhost:5173}


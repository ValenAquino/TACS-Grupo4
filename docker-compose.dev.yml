services:

  mongodb:
    image: mongo:7
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DB}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data_dev:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    env_file: .env
    ports:
      - "8080:8080"
    command: mvn spring-boot:run
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"
    command: npm run dev -- --host
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
          initial_sync: true
        - action: sync
          path: ./frontend/index.html
          target: /app/index.html
          initial_sync: true
        - action: sync
          path: ./frontend/public
          target: /app/public
          initial_sync: true

volumes:
  mongodb_data_dev:

services:
  mongodb-test:
    image: mongo:7
    command: ["--replSet", "rs0"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s
    profiles:
      - test

  mongo-init-test:
    image: mongo:7
    depends_on:
      mongodb-test:
        condition: service_healthy
    command:
      - mongosh
      - --host
      - mongodb-test:27017
      - --eval
      - |
        try { rs.status() }
        catch(e) { rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongodb-test:27017'}]}) }
    restart: "no"
    profiles:
      - test

  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongodb-test:27017/tacs-test
      SEED_DATA: "true"
    command: mvn spring-boot:run
    depends_on:
      mongo-init-test:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 1s
    profiles:
      - test

  mongo-express-test:
    image: mongo-express:1
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb-test:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      mongo-init-test:
        condition: service_completed_successfully
    profiles:
      - test

  loadtest:
    image: grafana/k6
    depends_on:
      backend-test:
        condition: service_healthy
    volumes:
      - ./backend/src/test/loadtest:/loadtest
    entrypoint: /bin/sh /loadtest/entrypoint.sh
    profiles:
      - test

volumes:
  mongodb_data_test: